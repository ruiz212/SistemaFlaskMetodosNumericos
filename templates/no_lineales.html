{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/no_lineales.css') }}">
{% endblock %}

{% block content %}
<div class="page-container fade-in">
    <h2 class="page-title">Buscador de Raíces (Funciones)</h2>
    
    <div class="glass-panel form-panel">
        <div class="form-row">
            <div class="input-group flex-2">
                <label>Ecuación f(x):</label>
                <input type="text" id="ecuacion-nl" placeholder="Ej: x**3 - 3.5*x**2 + 2.75*x - 0.5" class="input-control">
            </div>
            <div class="input-group">
                <label>Método:</label>
                <select id="metodo-nl" class="input-control" onchange="actualizarCamposNL()">
                    <option value="Bisección">Bisección</option>
                    <option value="Regla Falsa">Regla Falsa</option>
                    <option value="Newton-Raphson">Newton-Raphson</option>
                    <option value="Secante">Secante</option>
                    <option value="Punto fijo">Punto fijo</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ángulos:</label>
                <select id="angulo-nl" class="input-control">
                    <option value="rad">Radianes</option>
                    <option value="deg">Grados</option>
                </select>
            </div>
            <div class="input-group flex-1">
                <label>Tol (%):</label>
                <input type="text" id="tol-nl" placeholder="Ej: 0.01" class="input-control">
            </div>
        </div>

        <div class="form-row mt-3" id="campos-dinamicos-nl">
            <!-- Se llena dinámicamente -->
        </div>

        <div class="form-actions mt-4">
            <button class="btn btn-primary" onclick="calcularNL()">Calcular</button>
            <button class="btn btn-danger" onclick="limpiarNL()">Limpiar</button>
        </div>
    </div>

    <div class="table-container glass-panel mt-4">
        <div class="table-responsive">
            <table id="tabla-nl" class="data-table">
                <thead>
                    <tr id="thead-nl">
                        <!-- Headers dinámicos -->
                    </tr>
                </thead>
                <tbody id="tbody-nl">
                    <!-- Resultados -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="result-panel mt-4 flex-row">
        <div id="resultado-nl" class="resultado-tarjeta flex-3 text-center">
            Esperando parámetros...
        </div>
        <button class="btn btn-success flex-1" id="btn-exportar-nl" disabled onclick="exportarExcel('tabla-nl', 'NoLineales')">
            Exportar a Excel
        </button>
    </div>

    <!-- ════════════════════════════════════════════════
         SECCIÓN DE GRÁFICA — Se muestra tras calcular
         ════════════════════════════════════════════════ -->
    <div id="grafica-seccion" class="glass-panel mt-4 grafica-seccion" style="display:none;">

        <!-- Cabecera del panel de gráfica -->
        <div class="grafica-header">
            <div class="grafica-title-row">
                <span class="grafica-icon">
                    <i class="ph-bold ph-chart-line-up"></i>
                </span>
                <h3 class="grafica-title">Visualización de la Función</h3>
                <span class="iter-badge" id="grafica-iter-badge" title="Iteraciones graficadas">0</span>
                <span class="iter-badge-label">iteraciones</span>
            </div>
            <div class="grafica-legend-row">
                <span class="legend-dot" style="background:rgba(245,158,11,1)"></span><span>f(x)</span>
                <span class="legend-dot" style="background:rgba(6,182,212,1)"></span><span>Iteraciones</span>
                <span class="legend-dot legend-star" style="background:rgba(16,185,129,1)">★</span><span>Raíz</span>
            </div>
        </div>

        <!-- Canvas wrapper -->
        <div id="chart-wrapper" class="chart-wrapper">
            <!-- Chart.js renderiza aquí -->
        </div>

        <!-- Pie del panel con info de la raíz -->
        <div class="grafica-footer" id="grafica-footer">
            <!-- Se llena dinámicamente -->
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Chart.js para la gráfica -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Módulo de gráfica animada -->
<script src="{{ url_for('static', filename='js/grafica_nl.js') }}"></script>

<script>
// ── Sobreescribir calcularNL para llamar también a la gráfica ──────────────
(function () {
    const _calcularNLOriginal = window.calcularNL;

    window.calcularNL = async function (force = false) {
        await _calcularNLOriginal(force);

        // Después del cálculo, solicitar la gráfica si hay resultado exitoso
        const resultDiv = document.getElementById('resultado-nl');
        if (resultDiv && resultDiv.classList.contains('success')) {
            const ecuacion   = document.getElementById('ecuacion-nl').value;
            const metodo     = document.getElementById('metodo-nl').value;
            const angulo     = document.getElementById('angulo-nl')?.value ?? 'rad';
            const resultados = window._lastResultadosNL || [];

            await solicitarGraficaNL(ecuacion, metodo, resultados, angulo);

            // Actualizar footer de la gráfica
            const footerEl = document.getElementById('grafica-footer');
            if (footerEl && window._lastRaiz) {
                footerEl.innerHTML = `
                    <div class="grafica-footer-inner">
                        <span class="footer-label">Raíz encontrada</span>
                        <span class="footer-value">${window._lastRaiz}</span>
                        <span class="footer-method">${metodo}</span>
                    </div>`;
            }
        }
    };

    // Limpiar también la gráfica
    const _limpiarNLOriginal = window.limpiarNL;
    window.limpiarNL = function () {
        _limpiarNLOriginal();
        limpiarGraficaNL();
    };
})();
</script>
{% endblock %}
