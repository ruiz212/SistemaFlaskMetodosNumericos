<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora online de métodos numéricos para estudiantes de ingeniería. Resuelve ecuaciones no lineales, sistemas lineales, polinomios e interpolación paso a paso.">
    <meta name="keywords" content="calculadora metodos numericos, resolver ecuaciones no lineales online, metodo biseccion online, calculadora jacobi y gauss seidel, interpolacion de newton online, calculadora raices polinomios, metodos numericos para ingenieria, resolver sistemas de ecuaciones iterativo, graficadora metodos numericos, calculadora metodo muller y bairstow">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>Calculadora de Métodos Numéricos | Resuelve Ecuaciones y Sistemas Paso a Paso</title>
    <!-- Favicon del Sistema -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}");
        });
      }
    </script>
    <!-- Optimización de Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <!-- Iconos Phosphor (CSS) -->
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    
    <!-- driver.css (Render-blocking es aceptable para CSS crítico, pero dejémoslo) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.css"/>
    
    <!-- katex css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    {% block styles %}{% endblock %}
    
    <style>
        /* Contenedor principal inicializado transparente para la animación de entrada de página */
        .page-transition-wrapper {
            opacity: 0;
            transform: translateY(20px);
        }
    </style>
    
    <script>
        // Aplicar el tema inmediatamente para evitar parpadeos (FOUC)
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.add(savedTheme);
    </script>
</head>
<body>
    <header class="topbar">
        <div class="topbar-content">
            <a href="{{ url_for('index') }}" class="brand">
                <div class="brand-logo">
                    <i class="ph-bold ph-sigma"></i>
                </div>
                <span class="brand-text">Suite Numérica</span>
            </a>
            
            <nav class="nav-menu">
                <a href="{{ url_for('index') }}" class="nav-item page-link {% if request.path == '/' %}active{% endif %}">
                    <i class="ph ph-house"></i> <span>Inicio</span>
                </a>
                <a href="{{ url_for('no_lineales') }}" class="nav-item page-link {% if request.path == '/no-lineales' %}active{% endif %}">
                    <i class="ph ph-chart-line-up"></i> <span>Ecuaciones</span>
                </a>
                <a href="{{ url_for('polinomios') }}" class="nav-item page-link {% if request.path == '/polinomios' %}active{% endif %}">
                    <i class="ph ph-function"></i> <span>Polinomios</span>
                </a>
                <a href="{{ url_for('sistemas') }}" class="nav-item page-link {% if request.path == '/sistemas' %}active{% endif %}">
                    <i class="ph ph-intersect"></i> <span>Sistemas NL</span>
                </a>
                <a href="{{ url_for('sistemas_lineales') }}" class="nav-item page-link {% if request.path == '/sistemas-lineales' %}active{% endif %}">
                    <i class="ph ph-matrix"></i> <span>Sistemas Lin</span>
                </a>
                <a href="{{ url_for('iterativos') }}" class="nav-item page-link {% if request.path == '/iterativos' %}active{% endif %}">
                    <i class="ph ph-arrows-clockwise"></i> <span>Iterativos</span>
                </a>
                <a href="{{ url_for('interpolacion') }}" class="nav-item page-link {% if request.path == '/interpolacion' %}active{% endif %}">
                    <i class="ph ph-trend-up"></i> <span>Interpolación</span>
                </a>
                <a href="{{ url_for('integracion') }}" class="nav-item page-link {% if request.path == '/integracion' %}active{% endif %}">
                    <i class="ph ph-integral"></i> <span>Integración</span>
                </a>
                <a href="{{ url_for('aplicacion.panel_solar') }}" class="nav-item page-link {% if request.path.startswith('/aplicacion') %}active{% endif %}" style="color: #f59e0b;">
                    <i class="ph ph-sun"></i> <span style="font-weight: bold;">Aplicación IoT</span>
                </a>
            </nav>

            <div class="topbar-actions">
                <div class="theme-toggle action-btn" id="theme-btn" title="Cambiar Tema">
                    <i class="ph-fill ph-moon" id="theme-icon"></i>
                </div>
                
                <div class="tutorial-toggle action-btn" id="tutorial-btn" title="Iniciar Tutorial">
                    <i class="ph ph-question"></i>
                </div>
                
                <a href="{{ url_for('configuracion') }}" class="settings-toggle action-btn" id="settings-btn" title="Configuración Global">
                    <i class="ph ph-gear"></i>
                </a>

                <div class="mobile-menu-btn action-btn" id="mobile-btn">
                    <i class="ph ph-list"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Wrapper para la transición de página -->
    <main class="main-container page-transition-wrapper">
        {% block content %}{% endblock %}
    </main>

    <!-- Contenedor dinámico para la animación de "Limpiar" (Papelera) -->
    <div id="trash-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; overflow: hidden;"></div>

    <!-- Heavy Libraries (Deferred to prevent render-blocking) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/driver.js@1.0.1/dist/driver.js.iife.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js" defer></script>

    <!-- App Scripts -->
    <script src="{{ url_for('static', filename='js/animations.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/text_animator.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/settings.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/tutorial.js') }}" defer></script>
    
    <script>
        // Mobile menu toggle
        document.getElementById('mobile-btn').addEventListener('click', function() {
            document.querySelector('.nav-menu').classList.toggle('show');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
