{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/polinomios.css') }}">
{% endblock %}

{% block content %}
<div class="page-container fade-in">
    <h2 class="page-title">Raíces Complejas (Polinomios)</h2>
    
    <div class="glass-panel form-panel" style="position: relative;">
        <!-- Título de fondo dinámico -->
        <div id="bg-method-name" style="position: absolute; left: 32px; top: 32px; font-family: 'Outfit', sans-serif; font-size: 4rem; font-weight: 800; color: rgba(245, 158, 11, 0.15); pointer-events: none; user-select: none; z-index: 0; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;">
            Bairstow
        </div>

        <div class="form-row align-center" style="position: relative; z-index: 1; padding-top: 60px;">
            <div class="input-group flex-1">
                <label>Método:</label>
                <select id="metodo-pol" class="input-control" onchange="actualizarCamposPol(); actualizarNombreMetodoPol();">
                    <option value="Bairstow">Bairstow</option>
                    <option value="Müller">Müller</option>
                    <option value="Horner-Newton">Horner-Newton</option>
                </select>
            </div>
            <div class="input-group flex-1" id="grupo-grado">
                <label>Grado (n):</label>
                <input type="number" id="grado-pol" value="3" min="1" max="20" class="input-control text-center" onchange="generarCamposCoeficientes()">
            </div>
            <div class="input-group flex-2" id="grupo-ecuacion-pol" style="display: none;">
                <label>Ecuación f(x):</label>
                <input type="text" id="ecuacion-pol" class="input-control" placeholder="Ej: sin(x) - 0.5" oninput="previewMath('ecuacion-pol')">
                <div class="math-preview" id="preview-ecuacion-pol"></div>
            </div>
            <div class="input-group flex-1">
                <label>Tol (%):</label>
                <input type="text" id="tol-pol" placeholder="Ej: 1" class="input-control">
            </div>
            <div class="form-actions mt-4 flex-2">
                <button class="btn btn-primary" id="btn-calc-pol" onclick="calcularPol()">Calcular</button>
                <button class="btn btn-danger" onclick="limpiarPol()">Limpiar</button>
            </div>
        </div>

        <div class="form-row mt-3" id="campos-dinamicos-pol">
            <!-- Puntos iniciales para Müller u Horner-Newton -->
        </div>

        <div class="mt-4" id="seccion-coeficientes">
            <label class="section-label">Coeficientes a_n → a_0:</label>
            <div class="dynamic-grid" id="container-coefs" style="grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));">
                <!-- Se llenan dinámicamente -->
            </div>
        </div>
    </div>

    <div class="grid-layout mt-4">
        <div class="table-container glass-panel">
            <label class="section-label">Tabla de Iteraciones:</label>
            <div class="table-responsive">
                <table id="tabla-pol" class="data-table">
                    <thead id="thead-pol"></thead>
                    <tbody id="tbody-pol"></tbody>
                </table>
            </div>
        </div>
        
        <div class="console-container glass-panel">
            <label class="section-label">Registro y Raíces Finales:</label>
            <textarea id="consola-pol" class="console-output" readonly></textarea>
        </div>
    </div>

    <div class="result-panel mt-4 flex-row justify-end">
        <button class="btn btn-success" id="btn-exportar-pol" disabled onclick="exportarExcel('tabla-pol', 'Polinomios')">
            Exportar a Excel
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function actualizarNombreMetodoPol() {
        const select = document.getElementById('metodo-pol');
        if (select && typeof animateMethodNameChange === 'function') {
            animateMethodNameChange('bg-method-name', select.value);
        } else {
            const bgText = document.getElementById('bg-method-name');
            if (bgText && select) bgText.innerText = select.value;
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        actualizarNombreMetodoPol();
    });
</script>
{% endblock %}
