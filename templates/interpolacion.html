{% extends "base.html" %}

{% block content %}
<div class="page-container fade-in">
    <h2 class="page-title">Interpolación Polinomial</h2>
    
    <div class="glass-panel form-panel" style="position: relative;">
        <!-- Título de fondo dinámico -->
        <div id="bg-method-name" style="position: absolute; left: 32px; top: 32px; font-family: 'Outfit', sans-serif; font-size: 4rem; font-weight: 800; color: rgba(245, 158, 11, 0.15); pointer-events: none; user-select: none; z-index: 0; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;">
            Diferencias Divididas
        </div>

        <div class="form-row align-center" style="position: relative; z-index: 1; padding-top: 60px;">
            <div class="input-group flex-1">
                <label>Número de Puntos (n):</label>
                <input type="number" id="n-inter" value="3" min="2" max="20" class="input-control text-center" onchange="generarCamposInterpolacion()">
            </div>
            <div class="input-group flex-2">
                <label>Método:</label>
                <select id="metodo-inter" class="input-control" onchange="actualizarNombreMetodoInter()">
                    <option value="Diferencias Divididas">Diferencias Divididas (Newton)</option>
                    <option value="Lagrange">Lagrange</option>
                    <option value="Trazadores Cúbicos">Trazadores Cúbicos (Splines)</option>
                    <option value="Interpolación Lineal">Interpolación Lineal</option>
                    <option value="Interpolación Cuadrática">Interpolación Cuadrática</option>
                    <option value="Regresión Simple">Regresión Simple</option>
                    <option value="Regresión Polinomial">Regresión Polinomial</option>
                </select>
            </div>
            <div class="input-group flex-1" id="grupo-grado-inter" style="display: none;">
                <label>Grado (m):</label>
                <input type="number" id="grado-inter" value="2" min="1" max="10" class="input-control text-center">
            </div>
            <div class="input-group flex-1">
                <label>Tolerancia:</label>
                <input type="text" id="tol-inter" value="0.001" class="input-control text-center">
            </div>
            <div class="form-actions mt-4 flex-1" style="display: flex; gap: 10px;">
                <button class="btn btn-primary" id="btn-calc-inter" onclick="calcularInter()">Calcular</button>
                <button class="btn btn-secondary" onclick="limpiarInter()">Limpiar</button>
            </div>
        </div>

        <div class="mt-4">
            <label class="section-label">Puntos (x_i, y_i):</label>
            <div class="dynamic-grid" id="container-inter">
                <!-- Se llenan dinámicamente -->
            </div>
        </div>
    </div>

    <div class="result-panel mt-4 flex-column" id="resultado-inter-container" style="display:none; flex-direction: column !important; gap: 24px;">
        <!-- Tabla Arriba y más grande -->
        <div class="glass-panel w-full" style="padding: 24px;">
            <label class="section-label" id="titulo-tabla-inter" style="font-size: 1.2rem; color: var(--vp-gold);">TABLA DE CÁLCULO:</label>
            <div class="table-responsive mt-3">
                <table id="tabla-inter" class="data-table" style="font-size: 1.1rem;">
                    <thead id="thead-inter"></thead>
                    <tbody id="tbody-inter"></tbody>
                </table>
            </div>
            
            <!-- Bloque de Detalle de Errores y Parada -->
            <div id="razon-detencion-container" class="mt-4 p-4" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; display: none;">
                <h4 style="color: var(--vp-violet-l); font-size: 1rem; margin-bottom: 8px;">Análisis de Error y Criterio de Detención</h4>
                <div id="lista-errores" style="font-family: monospace; font-size: 0.95rem; color: var(--vp-muted); margin-bottom: 12px;"></div>
                <div id="texto-razon-detencion" style="font-size: 1rem; font-weight: bold; color: var(--color-success);"></div>
            </div>
            
            <!-- Contenedor para advertencias -->
            <div id="warnings-container" class="mt-4" style="display: none;"></div>
        </div>

        <!-- Resultados (Ecuaciones) Abajo -->
        <div id="resultado-inter" class="resultado-tarjeta success" style="flex-direction: column; align-items: flex-start; width: 100%;">
            <!-- Polinomios generados -->
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function actualizarNombreMetodoInter() {
    const select = document.getElementById('metodo-inter');
    const bgTextId = 'bg-method-name';
    const nInput = document.getElementById('n-inter');
    
    if (select && typeof animateMethodNameChange === 'function') {
        let txt = select.options[select.selectedIndex].text.split(' (')[0];
        if (txt === 'Diferencias Divididas') txt = 'Newton';
        else if (txt === 'Trazadores Cúbicos') txt = 'Splines';
        animateMethodNameChange(bgTextId, txt);
    } else {
        const bgText = document.getElementById(bgTextId);
        if (bgText && select) {
            let txt = select.options[select.selectedIndex].text.split(' (')[0];
            if (txt === 'Diferencias Divididas') txt = 'Newton';
            else if (txt === 'Trazadores Cúbicos') txt = 'Splines';
            bgText.innerText = txt;
        }
    }
    
    if (select.value === 'Interpolación Lineal') {
        nInput.value = 2;
        nInput.disabled = true;
        generarCamposInterpolacion();
    } else if (select.value === 'Interpolación Cuadrática') {
        nInput.value = 3;
        nInput.disabled = true;
        generarCamposInterpolacion();
    } else {
        nInput.disabled = false;
    }
    
    // Controlar visibilidad del grado para regresión polinomial
    const gradoGroup = document.getElementById('grupo-grado-inter');
    if (select.value === 'Regresión Polinomial') {
        gradoGroup.style.display = 'flex';
    } else {
        gradoGroup.style.display = 'none';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    actualizarNombreMetodoInter();
});

function limpiarInter() {
    document.getElementById('n-inter').value = 3;
    document.getElementById('n-inter').disabled = false;
    document.getElementById('metodo-inter').value = 'Diferencias Divididas';
    actualizarNombreMetodoInter();
    generarCamposInterpolacion();
    document.getElementById('resultado-inter-container').style.display = 'none';
    document.getElementById('resultado-inter').innerHTML = '';
}

function generarCamposInterpolacion() {
    const n = parseInt(document.getElementById('n-inter').value);
    const container = document.getElementById('container-inter');
    container.innerHTML = Array.from({length: n}, (_, i) => `
        <div class="point-input-card">
            <div class="input-group">
                <label>x_${i}</label>
                <input type="text" id="inter-x-${i}" class="input-control text-center" placeholder="0">
            </div>
            <div class="input-group">
                <label>y_${i}</label>
                <input type="text" id="inter-y-${i}" class="input-control text-center" placeholder="0">
            </div>
        </div>
    `).join('');
}

async function calcularInter() {
    const n = parseInt(document.getElementById('n-inter').value);
    const x = [], y = [];
    for(let i=0; i<n; i++) {
        x.push(document.getElementById(`inter-x-${i}`).value);
        y.push(document.getElementById(`inter-y-${i}`).value);
    }
    
    const metodoElegido = document.getElementById('metodo-inter').value;
    const payload = { 
        x, 
        y, 
        metodo: metodoElegido,
        tol: document.getElementById('tol-inter').value,
        grado_m: document.getElementById('grado-inter').value,
        cfg: window.getAdvancedSettings ? window.getAdvancedSettings() : {}
    };
    const data = await performRequest('/api/calcular_interpolacion', payload, 'btn-calc-inter');
    
    if (data.error) return showAlert('Error', data.error, 'error');
    
    document.getElementById('resultado-inter-container').style.display = 'flex';
    
    // Función para limpiar Sympy y pasar a LaTeX
    const sympyToLatex = (expr) => {
        if (!expr || expr === "Polinomio no calculado.") return "P(x)";
        let cleaned = expr.replace(/\*\*/g, '^');
        try {
            return math.parse(cleaned).toTex({parenthesis: 'auto'});
        } catch(e) {
            return cleaned;
        }
    };

    let resContainer = document.getElementById('resultado-inter');
    let htmlContent = '';
    
    if (metodoElegido === "Trazadores Cúbicos") {
        htmlContent += `<div class="mt-4 w-full"><strong style="color: var(--color-success); font-size: 1.2em; display:block; text-align:center;">Splines Cúbicos Naturales:</strong></div>`;
        data.polinomios_pasos.forEach((expr, idx) => {
            const intv = data.intervalos[idx];
            htmlContent += `<div class="mt-4 w-full" style="max-width: 100%; overflow-x: auto; padding-bottom: 10px;">
                <span style="color: var(--vp-gold); display:block; text-align:center; margin-bottom: 12px; font-weight: bold;">Para x ∈ [${intv[0]}, ${intv[1]}]</span>
                <div id="katex-spline-${idx}" style="min-width: max-content; padding: 0 15px;"></div>
            </div>`;
        });
        resContainer.innerHTML = htmlContent;
        
        data.polinomios_pasos.forEach((expr, idx) => {
            let latex = sympyToLatex(expr);
            katex.render(`S_{${idx}}(x) = ${latex}`, document.getElementById(`katex-spline-${idx}`), {displayMode: true, throwOnError: false});
        });
    }
    else if (data.polinomios_pasos && data.polinomios_pasos.length > 0) {
        if (metodoElegido === "Lagrange" || metodoElegido === "Interpolación Lineal" || metodoElegido === "Interpolación Cuadrática") {
            data.polinomios_pasos.forEach((paso, idx) => {
                htmlContent += `<div class="mt-4 w-full" style="max-width: 100%; overflow-x: auto; padding-bottom: 10px;">
                    <span style="color: var(--vp-gold); display:block; text-align:center; margin-bottom: 12px; font-weight: bold;">Paso ${idx + 1}: ${paso.titulo}</span>
                    <div id="katex-paso-${idx}" style="min-width: max-content; padding: 0 15px;"></div>
                </div>`;
            });
            resContainer.innerHTML = htmlContent;
            
            data.polinomios_pasos.forEach((paso, idx) => {
                katex.render(paso.ecuacion, document.getElementById(`katex-paso-${idx}`), {displayMode: true, throwOnError: false});
            });
        } else {
            // Newton / Diferencias Divididas
            data.polinomios_pasos.forEach((expr, idx) => {
                if (idx === data.polinomios_pasos.length - 1) {
                    htmlContent += `<div class="mt-4 w-full" style="max-width: 100%; overflow-x: auto; padding-bottom: 10px;">
                        <strong style="color: var(--color-success); font-size: 1.2em; display:block; text-align:center;">Polinomio Óptimo (Grado ${data.grado}):</strong>
                        <div id="katex-optimo" style="min-width: max-content; padding: 0 15px;"></div>
                    </div>`;
                } else {
                    htmlContent += `<div class="mt-3 w-full" style="opacity: 0.8; max-width: 100%; overflow-x: auto; padding-bottom: 10px;">
                        <span style="color: var(--text-secondary); display:block; text-align:center;">Polinomio (Grado ${idx}):</span>
                        <div id="katex-paso-${idx}" style="min-width: max-content; padding: 0 15px;"></div>
                    </div>`;
                }
            });
            
            resContainer.innerHTML = htmlContent;

            // Renderizar con KaTeX
            data.polinomios_pasos.forEach((expr, idx) => {
                let latex = sympyToLatex(expr);
                if (idx === data.polinomios_pasos.length - 1) {
                    katex.render(`P(x) = ${latex}`, document.getElementById('katex-optimo'), {displayMode: true, throwOnError: false});
                } else {
                    katex.render(`P_{${idx}}(x) = ${latex}`, document.getElementById(`katex-paso-${idx}`), {displayMode: true, throwOnError: false});
                }
            });
        }
    } else {
        let latex = sympyToLatex(data.ecuacion);
        resContainer.innerHTML = `<strong style="color: var(--color-success); font-size: 1.2em; display:block; text-align:center;">Polinomio Óptimo (Grado ${data.grado}):</strong><div id="katex-optimo"></div>`;
        katex.render(`P(x) = ${latex}`, document.getElementById('katex-optimo'), {displayMode: true, throwOnError: false});
    }
    
    // Renderizar la tabla de diferencias divididas
    const thead = document.getElementById('thead-inter');
    const tbody = document.getElementById('tbody-inter');
    thead.innerHTML = '';
    tbody.innerHTML = '';
    
    if (data.tabla && data.tabla.length > 0) {
        document.getElementById('titulo-tabla-inter').innerText = 'TABLA DE DIFERENCIAS DIVIDIDAS:';
        let theadHtml = '<tr><th>x_i</th><th>y_i</th>';
        for (let i = 1; i < data.tabla[0].length; i++) {
            theadHtml += `<th>Orden ${i}</th>`;
        }
        theadHtml += '</tr>';
        thead.innerHTML = theadHtml;
        
        data.tabla.forEach((row, i) => {
            let trHtml = `<tr><td>${document.getElementById(`inter-x-${i}`).value}</td>`;
            row.forEach((val) => {
                trHtml += `<td>${val !== "" ? Number(val).toFixed(4) : ""}</td>`;
            });
            trHtml += '</tr>';
            tbody.innerHTML += trHtml;
        });
    } else if (data.analisis_error) {
        document.getElementById('titulo-tabla-inter').innerText = 'ANÁLISIS DEL ERROR (REGRESIÓN):';
        let theadHtml = '<tr><th>X_i</th><th>Y_i</th><th>Ŷ_i (Pronóstico)</th><th>(Ŷ_i - Ȳ)²</th><th>(Y_i - Ŷ_i)²</th></tr>';
        thead.innerHTML = theadHtml;
        
        data.analisis_error.tabla.forEach((row) => {
            let trHtml = `<tr>
                <td>${Number(row[0]).toFixed(4)}</td>
                <td>${Number(row[1]).toFixed(4)}</td>
                <td style="color: var(--color-success);">${Number(row[2]).toFixed(4)}</td>
                <td>${Number(row[3]).toFixed(4)}</td>
                <td>${Number(row[4]).toFixed(4)}</td>
            </tr>`;
            tbody.innerHTML += trHtml;
        });
        
        // Agregar métricas R2 y r debajo de la tabla
        let metricasHtml = `
            <div class="mt-4 p-4 flex-column" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px;">
                <h4 style="color: var(--color-success); font-size: 1.1rem; margin-bottom: 12px; text-align: center;">Métricas de Ajuste</h4>
                <div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px;">
                    <div style="text-align: center;">
                        <span style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Coeficiente de Correlación (r)</span>
                        <strong style="color: white; font-size: 1.3rem;">${data.analisis_error.r.toFixed(4)}</strong>
                    </div>
                    <div style="text-align: center;">
                        <span style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Coeficiente de Determinación (R²)</span>
                        <strong style="color: white; font-size: 1.3rem;">${(data.analisis_error.R2 * 100).toFixed(2)}%</strong>
                        <span style="color: var(--vp-muted); font-size: 0.9rem; display: block; margin-top: 5px;">(${data.analisis_error.R2.toFixed(4)})</span>
                    </div>
                </div>
            </div>`;
        
        // Lo insertaremos antes del bloque de razón de detención
        let razonContainer = document.getElementById('razon-detencion-container');
        let oldMetricas = document.getElementById('regresion-metricas');
        if (oldMetricas) oldMetricas.remove();
        
        let mDiv = document.createElement('div');
        mDiv.id = 'regresion-metricas';
        mDiv.innerHTML = metricasHtml;
        razonContainer.parentNode.insertBefore(mDiv, razonContainer);
    } else {
        // Limpiar si no es regresión ni tiene tabla
        let oldMetricas = document.getElementById('regresion-metricas');
        if (oldMetricas) oldMetricas.remove();
        document.getElementById('titulo-tabla-inter').innerText = 'TABLA DE CÁLCULO:';
    }
    
    // Mostrar Errores y Razón de Detención
    if (data.razon_detencion) {
        document.getElementById('razon-detencion-container').style.display = 'block';
        document.getElementById('texto-razon-detencion').innerText = `Razón de detención: ${data.razon_detencion}`;
        
        if (data.errores_pasos && data.errores_pasos.length > 0) {
            let listHtml = '<ul>';
            data.errores_pasos.forEach((err, idx) => {
                listHtml += `<li>Error Máximo Evaluado (Grado ${idx + 1}): <span style="color: var(--vp-gold);">${err.toExponential(6)}</span></li>`;
            });
            listHtml += '</ul>';
            document.getElementById('lista-errores').innerHTML = listHtml;
        } else {
            document.getElementById('lista-errores').innerHTML = '';
        }
    } else {
        document.getElementById('razon-detencion-container').style.display = 'none';
    }
    
    // Advertencias
    const warnContainer = document.getElementById('warnings-container');
    if (data.warnings && data.warnings.length > 0) {
        let warnHtml = `<div class="p-3" style="background: rgba(245, 158, 11, 0.1); border-left: 4px solid #f59e0b; border-radius: 4px;">
            <h5 style="color: #f59e0b; margin-top: 0;">Advertencias:</h5>
            <ul style="margin-bottom: 0; padding-left: 20px; color: #fbbf24;">`;
        data.warnings.forEach(w => warnHtml += `<li>${w}</li>`);
        warnHtml += `</ul></div>`;
        warnContainer.innerHTML = warnHtml;
        warnContainer.style.display = 'block';
    } else {
        warnContainer.style.display = 'none';
        warnContainer.innerHTML = '';
    }
    
    playSound('success');
}

document.addEventListener('DOMContentLoaded', generarCamposInterpolacion);
</script>

<style>
.point-input-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 12px;
    display: flex;
    gap: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}
</style>
{% endblock %}
